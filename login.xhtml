<?xml version='1.0' encoding='UTF-8' ?>
<ui:composition template="logintemplate.xhtml"
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core">

    <ui:define name="content">

        <div class="form-container">

            <h:form>

                <h2>Login</h2>


                <div class="form-group">
                    <label for="usernameInputField">Username</label>
                    <h:inputText id="usernameInputField"
                                 value="#{userBean.username}"
                                 required="true"
                                 requiredMessage="Please enter your username."
                                 validatorMessage="Username Invalid. Please try again!">
                                <f:validateLength minimum="2" />
                    </h:inputText>
                    <h:message for="usernameInputField" styleClass="error"/>
                </div>

                <div class="form-group">
                    <label for="passwordInputField">Password</label>
                    <h:inputSecret id="passwordInputField"
                                   value="#{userBean.password}"
                                   required="true"
                                   requiredMessage="Please enter your password."
                                   validatorMessage="Invalid username or password. Please Try Again!">
                        <f:validateLength minimum="2"/>
                    </h:inputSecret>
                    <h:message for="passwordInputField" styleClass="error"/>
                </div>

                <h:commandButton value="Login"
                                 action="#{userBean.login()}"
                                 styleClass="btn-primary"/>

                <p class="register-link">
                    Don’t have an account?
                    <h:link outcome="register" value="Register here"/>
                </p>

            </h:form>

        </div>

    </ui:define>

</ui:composition>
